<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termin buchen – Wolf Vermögensberatung</title>
  <meta name="description" content="Buchen Sie jetzt Ihren kostenlosen Beratungstermin bei Wolf Vermögensberatung in Landau.">
  <link rel="icon" href="images/wolf-icon.jpeg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #CEB13B;
      --gold-dark: #b89e2f;
      --bg-darker: #141821;
      --bg-dark: #1a1f2e;
      --text-light: #f0f0f5;
      --text-light-muted: rgba(240, 240, 245, 0.6);
      --radius-md: 12px;
      --radius-lg: 20px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg-darker);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* Header */
    .header {
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header__logo img {
      height: 40px;
      display: block;
    }
    .header__back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-light-muted);
      transition: color 0.3s ease;
    }
    .header__back:hover { color: var(--text-light); }
    .header__back svg { width: 18px; height: 18px; }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 1.5rem;
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }
    .main__heading {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .main__heading h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .main__heading h1 span { color: var(--gold); }
    .main__heading p {
      font-size: 0.95rem;
      color: var(--text-light-muted);
    }

    /* Calendar embed */
    .calendar-wrap {
      width: 100%;
      flex: 1;
    }
    .calendar-wrap iframe {
      width: 100%;
      border: none;
      overflow: hidden;
      min-height: 700px;
      display: block;
      border-radius: var(--radius-lg);
    }

    /* Info bar */
    .info {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
      padding: 1rem;
    }
    .info__item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-light-muted);
    }
    .info__item svg {
      width: 16px;
      height: 16px;
      color: var(--gold);
      flex-shrink: 0;
    }

    /* Footer */
    .footer {
      padding: 1.2rem 1.5rem;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.78rem;
      color: var(--text-light-muted);
    }
    .footer a {
      color: var(--text-light-muted);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .footer a:hover { color: var(--text-light); }

    @media (max-width: 600px) {
      .main { padding: 1.5rem 1rem 1rem; }
      .main__heading h1 { font-size: 1.4rem; }
      .main__heading { margin-bottom: 1rem; }
      .info { gap: 0.8rem; }
      .calendar-wrap iframe { min-height: 600px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="header__logo">
      <img src="images/wolf-logo-gold.png" alt="Wolf Vermögensberatung">
    </a>
    <a href="index.html" class="header__back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      Zurück zur Startseite
    </a>
  </header>

  <main class="main">
    <div class="main__heading">
      <h1>Termin <span>buchen</span></h1>
      <p>Wählen Sie einen passenden Termin – kostenlos und unverbindlich.</p>
    </div>

    <div class="calendar-wrap">
      <iframe src="https://app.unchainedai.co/widget/booking/0HLhT556qZXKCpuTDabg" style="width: 100%; border: none; overflow: hidden;" scrolling="no" id="0HLhT556qZXKCpuTDabg_1774190776340"></iframe>
    </div>

    <div class="info">
      <div class="info__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ca. 30 Min.
      </div>
      <div class="info__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.12.8.3 1.58.55 2.33a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.75.25 1.53.43 2.33.55A2 2 0 0122 16.92z"/></svg>
        Telefon oder Video
      </div>
      <div class="info__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
        Oder persönlich in Landau
      </div>
      <div class="info__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        100% kostenlos
      </div>
    </div>
  </main>

  <script src="https://app.unchainedai.co/js/form_embed.js" type="text/javascript"></script>

  <footer class="footer">
    &copy; 2025 Wolf Vermögensberatung &middot;
    <a href="impressum.html">Impressum</a> &middot;
    <a href="datenschutz.html">Datenschutz</a>
  </footer>

</body>
</html>
